<!DOCTYPE html>

    <div class="hero-content">
      <p class="hero-pre"
        data-hy="Ուրախությամբ հրավիրում ենք ձեզ մեր հարսանիքին"

        <span class="ampersand">&</span>
        <span class="name-right" data-hy="Սուսաննա" data-ru="Сусанна" data-en="Susanna"></span>

      <div class="hero-divider">

          <span class="countdown-label" data-hy="ժամ" data-ru="часов" data-en="hrs"></span>

        <div class="countdown-unit">
          <span class="countdown-num" id="cd-mins">00</span>
          <span class="countdown-label" data-hy="րոպե" data-ru="минут" data-en="min"></span>
        </div>
        <span class="countdown-sep">:</span>
        <div class="countdown-unit">

          <span class="countdown-label" data-hy="վայրկյան" data-ru="секунд" data-en="sec"></span>
        </div>
      </div>

      <a href="#agenda" class="hero-cta"

        data-ru="Смотреть программу"
        data-en="View Schedule"></a>

           data-ru="«Любовь долготерпит, милосердствует, любовь никогда не перестаёт»"
           data-en="«Love is patient, love is kind, love never fails»"></p>

              data-en="1 Corinthians 13:4,8"></cite>

      </div>
    </div>

            data-ru="Микаел и Сусанна получат Божье благословение в церкви Святого Креста в окружении любви семьи и близких."

          <p class="card-venue">

              data-en="Wedding Party"></h3>
          <p class="card-desc"
            data-hy="Դուք հրավիրված եք Հարսանեկան խնջույքի՝ երաժշտությամբ, ծիծաղով ու անմոռանալի հիշողություններով անցկացնելու երեկոն։"

            <span data-hy="Ազատության 24/44, Երևան"
                  data-ru="пр. Азатутян 24/44, Ереван"
                  data-en="Azatutyan 24/44, Yerevan"></span>
